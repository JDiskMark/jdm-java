name: Windows MSI Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  build-msi:
    runs-on: windows-latest  # Windows runner auto-activates the windows-msi Maven profile

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build Windows MSI (unsigned)
        # Builds jdm-core first (-am = also build upstream dependencies),
        # then jdm-msi. The windows-msi Maven profile activates automatically
        # on the Windows runner. No -Psign so signtool is not invoked.
        run: mvn clean install -pl jdm-core,jdm-dist/jdm-msi -am --no-transfer-progress

      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdiskmark-windows-msi
          path: jdm-dist/jdm-msi/target/*.msi
          if-no-files-found: error
