name: Linux RPM Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux-rpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install rpmbuild
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build RPM Package
        # The linux-rpm Maven profile activates automatically on the Linux runner.
        run: mvn clean install -pl jdm-core,jdm-dist/jdm-rpm -am --no-transfer-progress

      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdiskmark-rpm-pkg
          path: jdm-dist/jdm-rpm/target/*.rpm
          if-no-files-found: error
