name: Linux RPM Build

on:
  push:
    branches: [ "**" ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches: [ "dev", "release/**" ]
  workflow_dispatch:

jobs:
  build-linux-rpm:
    runs-on: ubuntu-latest
    # Run inside a Fedora container so rpmbuild, macros, and spec behaviour
    # match a native RPM platform. Building RPMs inside Ubuntu/Debian runners
    # uses a foreign rpmbuild whose macro paths, defaults, and shell behaviour
    # differ enough to break spec %install sections that work on Fedora.
    container: fedora:latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install rpm-build and Maven
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            rpm-build \
            maven \
            findutils \
            which
          rpmbuild --version
          mvn --version

      - name: Set up JDK 25
        # setup-java works inside containers; it downloads Temurin directly.
        # Fedora's own repos may not yet ship java-25-openjdk-devel, so we
        # use Temurin to guarantee the same JDK version as the DEB builds.
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Diagnose rpmbuild (render spec + run directly)
        run: |
          # Render the spec template directly with sed — same logic as the
          # Maven render-rpm-spec exec, without requiring jdm-core to be built.
          RPM_VERSION=$(grep -m1 '<rpm.version>' pom.xml | sed 's|.*<rpm.version>\(.*\)</rpm.version>.*|\1|')
          LICENSE_PATH="$(pwd)/LICENSE.md"
          mkdir -p jdm-dist/jdm-rpm/target/rpm-resources
          sed -e "s|@VERSION@|${RPM_VERSION}|g" \
              -e "s|@LICENSE_PATH@|${LICENSE_PATH}|g" \
              jdm-dist/jdm-rpm/resources/jdiskmark.spec.template \
              > /tmp/jdiskmark-diag.spec
          echo "=== Rendered spec ===" && cat /tmp/jdiskmark-diag.spec

          # Build a minimal image tree that mirrors what jpackage creates so we
          # can run rpmbuild directly and see its error output.
          TMPDIR=$(mktemp -d)
          mkdir -p "$TMPDIR"/{SPECS,BUILD,BUILDROOT,RPMS,SRPMS}
          mkdir -p "$TMPDIR/image/opt/jdiskmark/bin"
          mkdir -p "$TMPDIR/image/opt/jdiskmark/lib"
          echo '#!/bin/sh' > "$TMPDIR/image/opt/jdiskmark/bin/jdiskmark"
          chmod +x "$TMPDIR/image/opt/jdiskmark/bin/jdiskmark"
          printf '[Desktop Entry]\nName=jdiskmark\nComment=Test\nExec=/opt/jdiskmark/bin/jdiskmark\nIcon=/opt/jdiskmark/lib/jdiskmark.png\nTerminal=false\nType=Application\nCategories=Utility\nMimeType=\n' \
            > "$TMPDIR/image/opt/jdiskmark/lib/jdiskmark-jdiskmark.desktop"
          cp /tmp/jdiskmark-diag.spec "$TMPDIR/SPECS/jdiskmark.spec"

          echo "=== rpmbuild direct run ==="
          rpmbuild -bb "$TMPDIR/SPECS/jdiskmark.spec" \
            --define "_sourcedir $TMPDIR/image" \
            --define "_rpmdir /tmp/rpmout" \
            --define "_topdir $TMPDIR" \
            --define "_rpmfilename jdiskmark-diag.x86_64.rpm" \
            2>&1 || echo "rpmbuild exited: $?"

      - name: Build RPM Package
        # Explicitly activating the linux-rpm profile to ensure jpackage runs.
        run: mvn clean install -pl jdm-core,jdm-dist/jdm-rpm -am -Plinux-rpm --no-transfer-progress

      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v7
        with:
          name: jdiskmark-rpm-pkg
          path: jdm-dist/jdm-rpm/target/*.rpm
          if-no-files-found: error
          # Disable zipping so it can be downloaded raw from the Actions tab
          archive: false
