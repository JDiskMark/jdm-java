name: Generic ZIP Build

on:
  push:
    branches:
      - main
      - maven
  pull_request:
    branches:
      - main
      - maven

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '25'

    # TODO: wire the Maven command to target only jdm-core + jdm-dist/jdm-zip
    # e.g. mvn clean install -pl jdm-core,jdm-dist/jdm-zip -am --no-transfer-progress
    - name: Build with Maven
      run: mvn clean install --no-transfer-progress

    - name: Archive ZIP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jdm-zip-distribution
        path: jdm-zip/target/*.zip
