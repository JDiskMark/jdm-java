name: Build and Package

on:
  push:
    branches:
      - main
      - maven
  pull_request:
    branches:
      - main
      - maven

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Use any necessary environment variables or adjust as needed

    steps:
    - name: Checkout code
      uses: actions/checkout@v6  # Upgrade to the latest compatible version with Node.js 24

    - name: Set up JDK
      uses: actions/setup-java@v4  # Ensure using latest versions compatible with Node.js 24
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build with Maven
      run: mvn clean install

    - name: Archive ZIP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jdm-zip-distribution
        path: jdm-zip/target/*.zip
