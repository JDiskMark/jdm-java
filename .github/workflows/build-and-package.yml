name: Build and Package

on:
  push:
    branches:
      - main
      - maven
  pull_request:
    branches:
      - main
      - maven

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3  # Update if a newer version is available
    - name: Set up JDK
      uses: actions/setup-java@v3  # Update if a newer version is available
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build with Maven
      run: mvn clean install

    - name: Archive ZIP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jdm-zip-distribution
        path: jdm-zip/target/*.zip
