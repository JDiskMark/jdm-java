name: Linux DEB Build

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build-debian:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'oracle' # Oracle provides the earliest access to 25
        cache: 'ant'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ant ant-optional fakeroot dpkg-dev

    - name: Build with Ant
      # This runs the standard clean and jar targets before building the DEB
      run: ant create-deb

    - name: Build Fat DEB (Self-Contained)
      # This uses jpackage to bundle the runtime
      run: ant create-fat-deb

    - name: Upload Standard DEB
      uses: actions/upload-artifact@v4
      with:
        name: jdiskmark-standard-deb
        path: dist/jdiskmark_*_all.deb

    - name: Upload Fat DEB
      uses: actions/upload-artifact@v4
      with:
        name: jdiskmark-fat-deb
        path: dist/*.deb