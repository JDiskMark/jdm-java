name: Build and Release

on:
  # This "**" means it will run on the branch you are currently testing
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # This adds a button to manually trigger the build

jobs:
  # --- WINDOWS MSI BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build Windows MSI
        # -pl tells Maven to only build the windows module
        # -am tells Maven to also build any dependencies (like jdm-core)
        run: mvn clean install -P win-msi -pl jdm-dist/jdm-windows -am

      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdiskmark-windows-msi
          path: jdm-dist/jdm-windows/target/*.msi

  # --- LINUX DEBIAN BUILD ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build Debian Package
        # -pl tells Maven to only build the zip/linux module
        # -am tells Maven to also build any dependencies (like jdm-core)
        run: mvn clean install -P linux-deb -pl jdm-dist/jdm-zip -am

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdiskmark-debian-pkg
          # Updated path to match the jdm-zip target folder
          path: jdm-dist/jdm-zip/target/*.deb